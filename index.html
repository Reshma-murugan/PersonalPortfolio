<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&display=swap" rel="stylesheet">
    <title>Reshma | Portfolio</title>
  </head>
  <body>
    <div id="root"></div>
    <!-- Hidden Netlify Form (static HTML so Netlify can detect it at build time) -->
    <form
      id="netlify-contact-form"
      name="contact"
      method="POST"
      data-netlify="true"
      style="display: none;"
    >
      <input type="hidden" name="form-name" value="contact" />
      <input type="text" name="name" id="netlify-contact-name" />
      <input type="email" name="email" id="netlify-contact-email" />
      <input type="text" name="subject" id="netlify-contact-subject" />
      <textarea name="message" id="netlify-contact-message"></textarea>
      <div style="display: none;">
        <label>
          Don’t fill this out if you’re human:
          <input type="text" name="bot-field" id="netlify-contact-bot-field" />
        </label>
      </div>
    </form>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
